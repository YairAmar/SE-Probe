name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .

  nbstripout-check:
    name: Notebook outputs cleared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install nbstripout
        run: pip install nbstripout
      - name: Verify notebooks have no outputs
        run: |
          shopt -s nullglob
          fail=0
          for nb in notebooks/*.ipynb; do
            if ! nbstripout --verify "$nb"; then
              echo "::error::Notebook $nb has cell outputs (run nbstripout)."
              fail=1
            fi
          done
          exit $fail

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest tests/
