name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-book
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + book extras
        run: pip install -e .[docs]

      - name: Restore notebook cache
        uses: actions/cache@v4
        with:
          path: _build/.jupyter_cache
          key: jbcache-${{ hashFiles('notebooks/*.ipynb', 'results_demo/*.parquet', 'se_probe/**/*.py', '_config.yml') }}
          restore-keys: |
            jbcache-

      - name: Build book
        run: jupyter-book build .
        # SE_PROBE_RUN_INFERENCE intentionally unset (per JB4)

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/html
          cname: ""  # no custom domain
